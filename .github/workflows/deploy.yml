name: Java CI/CD with Maven

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Make application-secret.properties
      run: |
        mkdir -p src/main/resources
        echo "${{ secrets.APPLICATION_SECRET_PROPERTIES }}" > src/main/resources/application-secret.properties

    - name: Make GCP_Key.json
      run: |
        mkdir -p src/main/resources
        echo "${{ secrets.GCP_Key_json }}" > src/main/resources/GCP_Key.json

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Deliver JAR via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "target/*.jar"
        target: "~/app"
        strip_components: 1

 # 5. GCP Debian VM에서 기존 프로세스 종료 후 새 JAR 실행 (SSH)
    - name: Execute remote SSH commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        envs: MAIL_USERNAME,MAIL_PASSWORD
        script: |
          mkdir -p ~/app
          cd ~/app
          
          # 1. sudo로 실행된 자바 프로세스까지 포함하여 정밀 조회
          CURRENT_PID=$(pgrep -f 'java -jar' | grep -v "$$" || true)
          
          if [ -z "$CURRENT_PID" ]; then
            echo "현재 구동 중인 스프링 부트 애플리케이션이 없습니다."
          else
            echo "구동 중인 스프링 부트 프로세스 발견 (PIDs: $CURRENT_PID)"
            for pid in $CURRENT_PID; do
              echo "스프링 부트 프로세스 종료 시도 (PID: $pid)"
              # 기존 프로세스가 sudo로 켜졌을 수 있으므로 종료할 때도 sudo를 붙입니다.
              sudo kill -15 $pid 2>/dev/null || true
            done
            sleep 3
          fi
          
          # 2. 실행할 새 JAR 파일 찾기
          JAR_NAME=$(ls -tr *.jar 2>/dev/null | grep -v 'original' | grep -v 'plain' | tail -n 1 || true)
          
          if [ -z "$JAR_NAME" ]; then
            echo "❌ 에러: ~/app 디렉토리에 실행할 JAR 파일이 존재하지 않습니다!"
            exit 1
          fi
          
          echo "실행할 JAR 파일: $JAR_NAME"
          
          # 3. sudo를 사용한 백그라운드 구동 및 로그 저장
          # ⚠️ sudo와 nohup을 같이 쓸 때는 전체 명령어를 bash -c ''로 감싸주어야 로그 유실과 리다이렉션 에러가 나지 않습니다.
          sudo bash -c "MAIL_USERNAME=$MAIL_USERNAME MAIL_PASSWORD=$MAIL_PASSWORD nohup java -jar $JAR_NAME > nohup.out 2>&1 < /dev/null &"
          
          # 4. 정상 종료 처리
          sleep 1
          echo "🚀 새 애플리케이션이 관리자(sudo) 권한으로 백그라운드 구동 명령을 받았습니다."

