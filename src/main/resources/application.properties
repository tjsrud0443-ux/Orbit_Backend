spring.application.name=Orbit

spring.config.import=application-secret.properties

server.port=80

spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
mybatis.mapper-locations=classpath:mappers/*-mapper.xml

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

spring.cloud.gcp.credentials.location=file:src/main/resources/GCP_Key.json
spring.cloud.gcp.bucket = orbit-private

jwt.expiration = 86400000

spring.ai.google.genai.api-key=${api-key}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite

# OpenAI 자동 설정 비활성화
spring.ai.openai.api-key=DISABLED
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration
  
spring.profiles.include=secret
encryption.aes256.secret-key=${aes.secret.key}
encryption.aes256.iv=${aes.iv}

# ==========================================
# Qdrant Vector DB 설정
# ==========================================
# Spring AI 2.x 기준 Qdrant 설정 프로퍼티 명세 적용
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=orbit_policy_collection

# ==========================================
# Docker bge-m3 임베딩 서버 연동 설정 (커스텀)
# ==========================================
embedding.bge-m3.url=http://localhost:8085/embed